server:
  port: 19097

spring:
  application:
    name: ai-service
  config:
    import: "optional:configserver:"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=ai_schema
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        default_schema: ai_schema
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      connect-timeout: 5s
      read-timeout: 60s
      chat:
        options:
          model: gemini-2.5-flash
          reasoning-effort: low
      embedding:
        options:
          model: gemini-embedding-2
          dimensions: 768
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        schema-name: ai_schema

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

ai:
  chat:
    session-expire-hours: 24
    max-history: 10
    similarity-threshold: 0.7
    top-k: 3
  document:
    chunk-size: 500
    chunk-overlap: 50
    tika-max-string-length: 500000

langfuse:
  host: ${LANGFUSE_HOST:http://localhost:3001}
  auth-header: ${LANGFUSE_AUTH_HEADER:}

management:
  tracing:
    sampling:
      probability: 1.0

