server:
  port: 19097

spring:
  application:
    name: ai-service
  config:
    import: "optional:configserver:"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=ai_schema
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        default_schema: ai_schema
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        options:
          model: gemini-2.5-flash
      embedding:
        options:
          model: gemini-embedding-2
          dimensions: 768
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        schema-name: ai_schema
    chat:
      observations:
        include-prompt: true
        include-completion: true
    embedding:
      observations:
        include-input: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

ai:
  chat:
    session-expire-hours: 24
    similarity-threshold: 0.7
    top-k: 3
  document:
    chunk-size: 500
    chunk-overlap: 50
    tika-max-string-length: 500000

management:
  otlp:
    tracing:
      endpoint: ${LANGFUSE_OTLP_ENDPOINT:http://langfuse:3000/api/public/otel/v1/traces}
      headers:
        Authorization: "Basic ${LANGFUSE_AUTH_HEADER:}"
  tracing:
    sampling:
      probability: 1.0

