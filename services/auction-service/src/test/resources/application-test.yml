spring:
  config:
    activate:
      on-profile: test
  cloud:
    config:
      enabled: false

  datasource:
    url: "jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS auction_schema"
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: auction_schema
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: true
        format_sql: true
