global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "spring-services"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "config-server:8888"
          - "discovery-server:8761"
          - "gateway-server:8000"
          - "user-service:19091"
          - "auction-service:19092"
          - "bid-service:19093"
          - "order-service:19094"
          - "payment-service:19095"
          - "notification-service:19096"
          - "ai-service:19097"
