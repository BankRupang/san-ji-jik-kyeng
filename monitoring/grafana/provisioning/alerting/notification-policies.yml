apiVersion: 1
policies:
  - orgId: 1
    receiver: slack-critical
    group_by: [alertname, application]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: slack-critical
        matchers:
          - severity = critical
        continue: false
      - receiver: slack-warn
        matchers:
          - severity = warn
        continue: false
