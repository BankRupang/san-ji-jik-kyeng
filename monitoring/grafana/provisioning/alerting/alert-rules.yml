apiVersion: 1
groups:

  # ============================================================
  # 서비스 가용성
  # ============================================================
  - orgId: 1
    name: availability
    folder: Sanji Alerts
    interval: 1m
    rules:
      - uid: sanji-service-down
        title: ServiceDown
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'up{job="spring-services"} == 0'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: classic_conditions
              datasource:
                type: __expr__
                uid: "-100"
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [-1]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
              refId: B
        # up == 0 이 반환하는 값은 0. 0 > -1 이면 alert 발동.
        # 모든 서비스가 정상이면 up == 0 결과가 empty -> noDataState: OK
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "서비스 다운: {{ $labels.application }}"
          description: "{{ $labels.application }} ({{ $labels.instance }}) 스크레이프 실패 1분 지속"
        isPaused: false

  # ============================================================
  # JVM
  # ============================================================
  - orgId: 1
    name: jvm
    folder: Sanji Alerts
    interval: 1m
    rules:
      - uid: sanji-jvm-heap
        title: HighJvmHeapUsage
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.8'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: classic_conditions
              datasource:
                type: __expr__
                uid: "-100"
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [-1]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
              refId: B
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "JVM Heap 80% 초과: {{ $labels.application }}"
          description: "{{ $labels.application }} Heap 사용률 {{ $value | humanizePercentage }} - GC 압력 및 OOM 위험"
        isPaused: false

      - uid: sanji-gc-overhead
        title: HighGcOverhead
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "jvm_gc_overhead > 0.3"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: classic_conditions
              datasource:
                type: __expr__
                uid: "-100"
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [-1]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
              refId: B
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "GC Overhead 30% 초과: {{ $labels.application }}"
          description: "{{ $labels.application }} GC에 CPU 시간 30% 이상 소모 중"
        isPaused: false

      - uid: sanji-thread-count
        title: HighThreadCount
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "jvm_threads_live_threads > 300"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: classic_conditions
              datasource:
                type: __expr__
                uid: "-100"
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [-1]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
              refId: B
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "Thread 수 이상: {{ $labels.application }}"
          description: "{{ $labels.application }} 라이브 스레드 {{ $value }}개 - 스레드 누수 의심"
        isPaused: false

  # ============================================================
  # HTTP
  # ============================================================
  - orgId: 1
    name: http
    folder: Sanji Alerts
    interval: 1m
    rules:
      - uid: sanji-5xx-error-rate
        title: High5xxErrorRate
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'sum by(application) (rate(http_server_requests_seconds_count{outcome="SERVER_ERROR"}[5m])) / sum by(application) (rate(http_server_requests_seconds_count[5m])) > 0.001'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: classic_conditions
              datasource:
                type: __expr__
                uid: "-100"
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [-1]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
              refId: B
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "5xx 에러율 0.1% 초과: {{ $labels.application }}"
          description: "{{ $labels.application }} 5xx 에러율 {{ $value | humanizePercentage }} (SLO: 0.1% 이하)"
        isPaused: false

      - uid: sanji-response-time
        title: HighResponseTime
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'http_server_requests_seconds_max{uri!="/actuator/prometheus",uri!="/actuator/health"} > 3'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: classic_conditions
              datasource:
                type: __expr__
                uid: "-100"
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [-1]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
              refId: B
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "응답시간 3초 초과: {{ $labels.application }}"
          description: "{{ $labels.application }} {{ $labels.uri }} 최대 응답시간 {{ $value }}s"
        isPaused: false

  # ============================================================
  # 프로세스 / CPU
  # ============================================================
  - orgId: 1
    name: process
    folder: Sanji Alerts
    interval: 1m
    rules:
      - uid: sanji-process-cpu
        title: HighProcessCpuUsage
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "process_cpu_usage > 0.7"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: classic_conditions
              datasource:
                type: __expr__
                uid: "-100"
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [-1]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
              refId: B
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "프로세스 CPU 70% 초과: {{ $labels.application }}"
          description: "{{ $labels.application }} JVM 프로세스 CPU {{ $value | humanizePercentage }}"
        isPaused: false
