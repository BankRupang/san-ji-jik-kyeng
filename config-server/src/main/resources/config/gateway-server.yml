server:
  port: 8000

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: false
          discovery:
            locator:
              enabled: false
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**, /api/v1/auth/**
            - id: auction-service
              uri: lb://auction-service
              predicates:
                - Path=/api/v1/auctions/**, /api/v1/products/**
            - id: bid-service
              uri: lb://bid-service
              predicates:
                - Path=/api/v1/bids/**
            - id: bid-service-ws
              uri: lb:ws://bid-service
              predicates:
                - Path=/ws/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**
            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/api/v1/ai/**

logging:
  level:
    com.bankrupang.sanjijk.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
