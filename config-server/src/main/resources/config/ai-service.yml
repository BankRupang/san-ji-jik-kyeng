server:
  port: 19097

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:postgres}?currentSchema=ai_schema
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ai_schema
        dialect: org.hibernate.dialect.PostgreSQLDialect

gemini:
  api-key: ${GEMINI_API_KEY}
