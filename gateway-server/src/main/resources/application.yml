server:
  port: 8000

spring:
  application:
    name: gateway-server
  config:
    import: "configserver:"
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service          # Eureka에 등록된 서비스 이름으로 로드밸런싱
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:18080/realms/sanjijk
          jwk-set-uri: http://localhost:18080/realms/sanjijk/protocol/openid-connect/certs
