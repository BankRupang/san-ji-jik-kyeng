name: Gemini Code Review

on:
  pull_request:
    branches:
      - dev
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v3

      - name: Get git diff for PR
        run: |
          if [ "${{ github.event.action }}" == "opened" ]; then
            git fetch origin "${{ github.event.pull_request.base.ref }}"
            git fetch origin "${{ github.event.pull_request.head.ref }}"
            git diff "origin/${{ github.event.pull_request.base.ref }}"..."origin/${{ github.event.pull_request.head.ref }}" > diff.txt

          elif [ "${{ github.event.action }}" == "synchronize" ]; then
            PARENT_COUNT=$(git cat-file -p ${{ github.event.after }} | grep "^parent " | wc -l)

            if [ "$PARENT_COUNT" -gt 1 ]; then
              echo "Merge commit detected. Extracting conflict resolution diff..."
              git show --format="" --cc ${{ github.event.after }} > diff.txt
            else
              git diff ${{ github.event.before }}..${{ github.event.after }} > diff.txt
            fi
          fi

      - name: Run Gemini Review
        id: gemini_review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require("fs");
            const diff_output = fs.readFileSync("diff.txt", "utf8");

            if (!diff_output.trim()) {
              fs.writeFileSync("review_result.txt", "새로운 커밋에 변경된 코드 내역이 없습니다.");
              console.log("No diff found. Skipping API call.");
              return;
            }

            let promptBase = "";
            try {
              promptBase = fs.readFileSync("prompts/code_review.txt", "utf8");
            } catch (err) {
              console.error("프롬프트 파일을 읽는 데 실패했습니다. 파일 경로를 확인해주세요.", err);
              return;
            }

            const prompt = `
            ${promptBase}
            
            Below is the git diff:
            
              <git diff>
              ${diff_output}
              </git diff>
              `;
            
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${process.env.GEMINI_API_KEY}`,
                "HTTP-Referer": "https://github.com",
                "X-Title": "GitHub Actions Code Review",
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "google/gemini-3.1-pro-preview",
                messages: [{ role: "user", content: prompt }]
              })
            });

            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(`OpenRouter API request failed: ${errorText}`);
            }

            const data = await response.json();
            const text = data.choices[0].message.content;
            
            fs.writeFileSync("review_result.txt", text);
            console.log("Review results saved!");

      - name: Comment on Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("review_result.txt", "utf8");
            
            const pr_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body
            });
