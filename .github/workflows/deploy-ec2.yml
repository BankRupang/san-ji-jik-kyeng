name: Deploy EC2 (Kafka / Monitoring)

# 모니터링 EC2: main push 시 ECS와 동시에 자동 배포
# Kafka EC2: 재기동 시 입찰 이벤트가 끊기므로 수동 전용 (경매 없는 시간에 담당자가 직접 실행)
# push로 트리거될 때는 monitoring만, 수동 실행 시에는 대상을 선택합니다.
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target:
        description: 배포 대상 EC2
        type: choice
        options: [ kafka, monitoring, both ]
        default: kafka

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  JMX_VERSION: "1.0.1"
  # 버전 변경 시: PowerShell로 새 해시 확인 후 JMX_SHA256 함께 업데이트
  # Invoke-WebRequest <새버전 URL> -OutFile jmx.jar; (Get-FileHash jmx.jar -Algorithm SHA256).Hash.ToLower()
  JMX_SHA256: "7d61f737fd661610ccc14aea79764faa1ea94a340cbc8f0029b3d2edea3d80c1"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cache JMX Exporter JAR
        id: cache-jmx
        if: ${{ inputs.target == 'kafka' || inputs.target == 'both' }}
        uses: actions/cache@v6
        with:
          path: jmx/jmx_prometheus_javaagent-${{ env.JMX_VERSION }}.jar
          key: jmx-exporter-${{ env.JMX_VERSION }}

      - name: Download JMX Exporter JAR
        if: ${{ (inputs.target == 'kafka' || inputs.target == 'both') && steps.cache-jmx.outputs.cache-hit != 'true' }}
        run: |
          set -euo pipefail
          mkdir -p jmx
          wget -q -O jmx/jmx_prometheus_javaagent-${JMX_VERSION}.jar \
            "https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/${JMX_VERSION}/jmx_prometheus_javaagent-${JMX_VERSION}.jar"
          echo "${JMX_SHA256}  jmx/jmx_prometheus_javaagent-${JMX_VERSION}.jar" | sha256sum -c

      - name: Upload deploy configs to S3
        env:
          TARGET: ${{ inputs.target || 'monitoring' }}
        run: |
          set -euo pipefail
          if [ "${TARGET}" = "kafka" ] || [ "${TARGET}" = "both" ]; then
            aws s3 sync . s3://sanji-terraform-state/deploy/kafka/ \
              --exclude "*" \
              --include "docker-compose.kafka.yml" \
              --include "jmx/kafka.yml" \
              --include "jmx/jmx_prometheus_javaagent-${JMX_VERSION}.jar" \
              --include "scripts/deploy-kafka.sh" \
              --include "scripts/env.sh" \
              --delete
          fi
          if [ "${TARGET}" = "monitoring" ] || [ "${TARGET}" = "both" ]; then
            aws s3 sync . s3://sanji-terraform-state/deploy/monitoring/ \
              --exclude "*" \
              --include "docker-compose.monitoring.yml" \
              --include "monitoring/*" \
              --include "scripts/deploy-monitoring.sh" \
              --include "scripts/env.sh" \
              --include "db/init/*" \
              --include "infra/keycloak/realm-export.json" \
              --delete
          fi

      - name: Send deploy command via SSM
        env:
          # push 트리거: inputs.target이 없으므로 monitoring 고정
          # 수동 실행: 선택한 값(kafka / monitoring / both) 사용
          TARGET: ${{ inputs.target || 'monitoring' }}
        run: |
          set -euo pipefail

          # --- 대상별 배포 스크립트 (EC2 위에서 실행됨) ---

          read -r -d '' KAFKA_SCRIPT <<'EOS' || true
          set -e
          mkdir -p /home/ec2-user/deploy/jmx /home/ec2-user/deploy/scripts
          aws s3 sync s3://sanji-terraform-state/deploy/kafka/ /home/ec2-user/deploy/ --region ap-northeast-2
          chmod +x /home/ec2-user/deploy/scripts/deploy-kafka.sh
          bash /home/ec2-user/deploy/scripts/deploy-kafka.sh
          EOS

          read -r -d '' MONITORING_SCRIPT <<'EOS' || true
          set -e
          mkdir -p /home/ec2-user/deploy/scripts
          aws s3 sync s3://sanji-terraform-state/deploy/monitoring/ /home/ec2-user/deploy/ --region ap-northeast-2
          chmod +x /home/ec2-user/deploy/scripts/deploy-monitoring.sh
          bash /home/ec2-user/deploy/scripts/deploy-monitoring.sh
          EOS

          # 대상 EC2(Role 태그)와 실행할 스크립트를 짝지어 SSM으로 보내고 완료까지 기다립니다.
          # Kafka는 3대이므로 인스턴스별로 루프를 돌아 각각 확인합니다.
          send_and_wait() {
            local role="$1" script="$2"
            echo "::group::deploy ${role}"

            # 멀티라인 스크립트를 SSM Parameters JSON으로 안전하게 변환
            jq -Rs '{commands: [.]}' <<< "${script}" > /tmp/ssm-params.json

            local command_id
            command_id=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --targets "Key=tag:Role,Values=${role}" \
              --parameters "file:///tmp/ssm-params.json" \
              --timeout-seconds 600 \
              --region "${AWS_REGION}" \
              --query "Command.CommandId" --output text)
            echo "CommandId: ${command_id}"

            # 인스턴스 ID 목록 (Role 태그로 실행 중인 인스턴스, 1대 이상)
            local -a instance_ids
            mapfile -t instance_ids < <(aws ec2 describe-instances \
              --filters "Name=tag:Role,Values=${role}" "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].InstanceId" --output json --region "${AWS_REGION}" \
              | jq -r '.[]')
            echo "InstanceIds: ${instance_ids[*]}"

            local overall_status="Success"

            for iid in "${instance_ids[@]}"; do
              aws ssm wait command-executed \
                --command-id "${command_id}" \
                --instance-id "${iid}" \
                --region "${AWS_REGION}" || true

              local status
              status=$(aws ssm get-command-invocation \
                --command-id "${command_id}" \
                --instance-id "${iid}" \
                --region "${AWS_REGION}" \
                --query "Status" --output text)
              echo "${iid} Status: ${status}"

              # 실행 로그 출력
              aws ssm get-command-invocation \
                --command-id "${command_id}" \
                --instance-id "${iid}" \
                --region "${AWS_REGION}" \
                --query "StandardOutputContent" --output text || true

              if [ "${status}" != "Success" ]; then
                echo "::error::${role} 배포 실패 (instance=${iid}, status=${status})"
                aws ssm get-command-invocation \
                  --command-id "${command_id}" \
                  --instance-id "${iid}" \
                  --region "${AWS_REGION}" \
                  --query "StandardErrorContent" --output text || true
                overall_status="${status}"
              fi
            done

            echo "::endgroup::"

            if [ "${overall_status}" != "Success" ]; then
              return 1
            fi
          }

          if [ "${TARGET}" = "kafka" ] || [ "${TARGET}" = "both" ]; then
            send_and_wait "kafka" "${KAFKA_SCRIPT}"
          fi
          if [ "${TARGET}" = "monitoring" ] || [ "${TARGET}" = "both" ]; then
            send_and_wait "monitoring" "${MONITORING_SCRIPT}"
          fi

      - name: Setup Keycloak realm and client secret
        if: ${{ inputs.target != 'kafka' }}
        run: bash scripts/keycloak-setup.sh
