name: Deploy EC2 (Kafka / Monitoring)

# 모니터링 EC2: main push 시 ECS와 동시에 자동 배포
# Kafka EC2: 재기동 시 입찰 이벤트가 끊기므로 수동 전용 (경매 없는 시간에 담당자가 직접 실행)
# push로 트리거될 때는 monitoring만, 수동 실행 시에는 대상을 선택합니다.
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target:
        description: 배포 대상 EC2
        type: choice
        options: [ kafka, monitoring, both ]
        default: kafka

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send deploy command via SSM
        env:
          # push 트리거: inputs.target이 없으므로 monitoring 고정
          # 수동 실행: 선택한 값(kafka / monitoring / both) 사용
          TARGET: ${{ inputs.target || 'monitoring' }}
        run: |
          set -euo pipefail

          # --- 대상별 배포 스크립트 (EC2 위에서 실행됨) ---

          read -r -d '' KAFKA_SCRIPT <<'EOS' || true
          set -e
          REPO_DIR=/home/ec2-user/sanji-jk
          if [ -d "${REPO_DIR}/.git" ]; then
            git -C "${REPO_DIR}" fetch origin main
            git -C "${REPO_DIR}" reset --hard origin/main
          else
            git clone https://github.com/BankRupang/san-ji-jik-kyeng.git "${REPO_DIR}"
          fi
          cd "${REPO_DIR}"
          IMDS_TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          KAFKA_PRIVATE_IP=$(curl -s -H "X-aws-ec2-metadata-token: ${IMDS_TOKEN}" http://169.254.169.254/latest/meta-data/local-ipv4)
          KAFKA_CLUSTER_ID=$(aws ssm get-parameter --name /sanji/prod/kafka/cluster-id --with-decryption --query Parameter.Value --output text --region ap-northeast-2)
          cat > .env <<EOF
          KAFKA_PRIVATE_IP=${KAFKA_PRIVATE_IP}
          KAFKA_CLUSTER_ID=${KAFKA_CLUSTER_ID}
          EOF
          chmod 600 .env
          docker compose -f docker-compose.kafka.yml pull
          docker compose -f docker-compose.kafka.yml up -d
          EOS

          read -r -d '' MONITORING_SCRIPT <<'EOS' || true
          set -e
          REPO_DIR=/home/ec2-user/sanji-jk
          if [ -d "${REPO_DIR}/.git" ]; then
            git -C "${REPO_DIR}" fetch origin main
            git -C "${REPO_DIR}" reset --hard origin/main
          else
            git clone https://github.com/BankRupang/san-ji-jik-kyeng.git "${REPO_DIR}"
          fi
          cd "${REPO_DIR}"
          KAFKA_PRIVATE_IP=$(aws ssm get-parameter --name /sanji/prod/kafka/private-ip --query Parameter.Value --output text --region ap-northeast-2)
          export KAFKA_PRIVATE_IP
          GRAFANA_ADMIN_PASSWORD=$(aws ssm get-parameter --name /sanji/prod/monitoring/grafana-admin-password --with-decryption --query Parameter.Value --output text --region ap-northeast-2)
          SLACK_WEBHOOK_URL=$(aws ssm get-parameter --name /sanji/prod/monitoring/slack-webhook-url --with-decryption --query Parameter.Value --output text --region ap-northeast-2)
          cat > .env <<EOF
          KAFKA_PRIVATE_IP=${KAFKA_PRIVATE_IP}
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
          SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
          EOF
          chmod 600 .env
          envsubst '$KAFKA_PRIVATE_IP' < monitoring/prometheus/prometheus.prod.yml.template > monitoring/prometheus/prometheus.prod.yml
          # ecs-targets.json이 없으면 빈 파일 생성 (ec2-user 소유여야 cron 스크립트가 덮어쓸 수 있음)
          [ -f monitoring/prometheus/ecs-targets.json ] || sudo -u ec2-user sh -c 'echo "[]" > monitoring/prometheus/ecs-targets.json'
          chown ec2-user:ec2-user monitoring/prometheus/ecs-targets.json
          # ecs-discovery.sh 실행 권한 부여
          chmod +x monitoring/prometheus/ecs-discovery.sh
          # /etc/cron.d 에 등록해서 ec2-user 권한으로 5분마다 실행
          sudo mkdir -p /etc/cron.d
          echo "*/5 * * * * ec2-user /home/ec2-user/sanji-jk/monitoring/prometheus/ecs-discovery.sh >> /home/ec2-user/ecs-discovery.log 2>&1" | sudo tee /etc/cron.d/ecs-discovery > /dev/null
          # 첫 배포 시 즉시 한 번 실행 (ec2-user로)
          sudo -u ec2-user /home/ec2-user/sanji-jk/monitoring/prometheus/ecs-discovery.sh || true
          docker compose -f docker-compose.monitoring.yml pull
          docker compose -f docker-compose.monitoring.yml up -d
          # prometheus.prod.yml은 바인드 마운트 파일이라 up -d만으로는 컨테이너가 재시작되지 않음
          # 설정 변경이 반영되도록 명시적으로 재시작
          docker compose -f docker-compose.monitoring.yml restart prometheus
          EOS

          # 대상 EC2(Role 태그)와 실행할 스크립트를 짝지어 SSM으로 보내고 완료까지 기다립니다.
          send_and_wait() {
            local role="$1" script="$2"
            echo "::group::deploy ${role}"

            # 멀티라인 스크립트를 SSM Parameters JSON으로 안전하게 변환
            jq -Rs '{commands: [.]}' <<< "${script}" > /tmp/ssm-params.json

            local command_id
            command_id=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --targets "Key=tag:Role,Values=${role}" \
              --parameters "file:///tmp/ssm-params.json" \
              --timeout-seconds 600 \
              --region "${AWS_REGION}" \
              --query "Command.CommandId" --output text)
            echo "CommandId: ${command_id}"

            # 대상 인스턴스 ID 조회 (Role 태그로 실행 중인 인스턴스)
            local instance_id
            instance_id=$(aws ec2 describe-instances \
              --filters "Name=tag:Role,Values=${role}" "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].InstanceId" --output text --region "${AWS_REGION}")
            echo "InstanceId: ${instance_id}"

            aws ssm wait command-executed \
              --command-id "${command_id}" \
              --instance-id "${instance_id}" \
              --region "${AWS_REGION}" || true

            local status
            status=$(aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${instance_id}" \
              --region "${AWS_REGION}" \
              --query "Status" --output text)
            echo "Status: ${status}"

            # 실행 로그 출력
            aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${instance_id}" \
              --region "${AWS_REGION}" \
              --query "StandardOutputContent" --output text || true
            echo "::endgroup::"

            if [ "${status}" != "Success" ]; then
              echo "::error::${role} 배포 실패 (status=${status})"
              aws ssm get-command-invocation \
                --command-id "${command_id}" \
                --instance-id "${instance_id}" \
                --region "${AWS_REGION}" \
                --query "StandardErrorContent" --output text || true
              return 1
            fi
          }

          if [ "${TARGET}" = "kafka" ] || [ "${TARGET}" = "both" ]; then
            send_and_wait "kafka" "${KAFKA_SCRIPT}"
          fi
          if [ "${TARGET}" = "monitoring" ] || [ "${TARGET}" = "both" ]; then
            send_and_wait "monitoring" "${MONITORING_SCRIPT}"
          fi
