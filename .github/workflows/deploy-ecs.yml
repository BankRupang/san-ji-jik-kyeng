name: Deploy ECS

# main에 코드가 합쳐지면 운영 ECS(App + Bid)로 자동 배포합니다.
# 흐름: JAR 빌드 -> Docker 이미지 빌드 -> ECR push -> ECS 롤링 배포 -> 안정화 대기
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 필요할 때 수동으로 다시 배포하는 버튼

# OIDC로 AWS에 키 없이 로그인하려면 id-token 쓰기 권한이 반드시 필요합니다.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECS_CLUSTER: sanji-prod-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build JARs
        run: ./gradlew bootJar -x test --parallel

      # OIDC 역할로 AWS 로그인
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 서비스 10개 이미지를 빌드해서 :latest 태그로 push 합니다.
      # 모든 Dockerfile은 빌드 컨텍스트가 레포 루트라, 경로(SERVICES 표)만 바꿔주면 됩니다.
      - name: Build and push images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail

          # "서비스이름:Dockerfile경로" 매핑 (config/discovery/gateway는 루트, 나머지는 services/)
          SERVICES=(
            "config-server:config-server/Dockerfile"
            "discovery-server:discovery-server/Dockerfile"
            "gateway-server:gateway-server/Dockerfile"
            "user-service:services/user-service/Dockerfile"
            "auction-service:services/auction-service/Dockerfile"
            "bid-service:services/bid-service/Dockerfile"
            "order-service:services/order-service/Dockerfile"
            "payment-service:services/payment-service/Dockerfile"
            "notification-service:services/notification-service/Dockerfile"
            "ai-service:services/ai-service/Dockerfile"
          )

          for entry in "${SERVICES[@]}"; do
            SERVICE="${entry%%:*}"
            DOCKERFILE="${entry#*:}"
            IMAGE="${ECR_REGISTRY}/sanji/${SERVICE}"
            echo "::group::build ${SERVICE}"
            docker build -f "${DOCKERFILE}" -t "${IMAGE}:latest" .
            docker push "${IMAGE}:latest"
            echo "::endgroup::"
          done

      # task definition은 그대로 두고, 같은 :latest 를 다시 pull 하도록 강제 재배포합니다.
      # 배포 후 새 태스크가 헬스체크를 통과하고 롤링이 끝날 때까지 기다립니다.
      #
      # [wave 배포 이유]
      # 계정 Fargate On-Demand vCPU 한도가 30이고, 정상 운영 시 19.5 vCPU를 씁니다.
      # 10개 서비스를 동시에 롤링하면 old + new 태스크가 겹쳐 ~39 vCPU가 필요해 한도 초과됩니다.
      # wave로 나눠 배포하면 한 wave 안에서만 겹치므로 최대 27.5 vCPU로 유지됩니다.
      #
      # [wave 구성 및 피크 vCPU]
      #   wave 1 (인프라): config-server(0.5) discovery-server(0.5) gateway-server(0.5)  → 최대 21   vCPU
      #   wave 2 (앱 1)  : user(2) auction(2) order(2) payment(2)                        → 최대 27.5 vCPU
      #   wave 3 (앱 2)  : bid(4, 2태스크) notification(2) ai(2)                         → 최대 27.5 vCPU
      #
      # [waiter 타임아웃]
      # AWS_MAX_ATTEMPTS=80 → 80 × 15초 = 20분. 기본값(40 × 15초 = 10분)의 두 배.
      - name: Deploy and wait for ECS services
        run: |
          set -euo pipefail
          export AWS_MAX_ATTEMPTS=80

          deploy_wave() {
            local services=("$@")
            for SERVICE in "${services[@]}"; do
              echo "  force-new-deployment: ${SERVICE}"
              aws ecs update-service \
                --cluster "${ECS_CLUSTER}" \
                --service "${SERVICE}" \
                --force-new-deployment \
                --region "${AWS_REGION}" \
                --no-cli-pager > /dev/null
            done

            local pids=()
            for SERVICE in "${services[@]}"; do
              aws ecs wait services-stable \
                --cluster "${ECS_CLUSTER}" \
                --region "${AWS_REGION}" \
                --services "${SERVICE}" &
              pids+=($!)
            done
            for pid in "${pids[@]}"; do
              wait "$pid"
            done
          }

          echo "=== Wave 1: 인프라 서비스 ==="
          deploy_wave config-server discovery-server gateway-server

          echo "=== Wave 2: 앱 서비스 (1) ==="
          deploy_wave user-service auction-service order-service payment-service

          echo "=== Wave 3: 앱 서비스 (2) ==="
          deploy_wave bid-service notification-service ai-service
