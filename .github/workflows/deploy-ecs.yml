name: Deploy ECS

# main에 코드가 합쳐지면 운영 ECS(App + Bid)로 자동 배포합니다.
# 흐름: JAR 빌드 → Docker 이미지 빌드 → ECR push → wave 순차 배포
# wave 내 서비스들은 update-service + wait를 동시에 실행합니다.
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 필요할 때 수동으로 다시 배포하는 버튼

# OIDC로 AWS에 키 없이 로그인하려면 id-token 쓰기 권한이 반드시 필요합니다.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECS_CLUSTER: sanji-prod-cluster

jobs:
  # -------------------------------------------------------------------------
  # 1) 빌드 + 이미지 push
  # -------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build JARs
        run: ./gradlew bootJar -x test --parallel

      # OIDC 역할로 AWS 로그인
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 서비스 10개 이미지를 빌드해서 :latest 태그로 push 합니다.
      - name: Build and push images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail

          # "서비스이름:Dockerfile경로" 매핑 (config/discovery/gateway는 루트, 나머지는 services/)
          SERVICES=(
            "config-server:config-server/Dockerfile"
            "discovery-server:discovery-server/Dockerfile"
            "gateway-server:gateway-server/Dockerfile"
            "user-service:services/user-service/Dockerfile"
            "auction-service:services/auction-service/Dockerfile"
            "bid-service:services/bid-service/Dockerfile"
            "order-service:services/order-service/Dockerfile"
            "payment-service:services/payment-service/Dockerfile"
            "notification-service:services/notification-service/Dockerfile"
            "ai-service:services/ai-service/Dockerfile"
          )

          for entry in "${SERVICES[@]}"; do
            SERVICE="${entry%%:*}"
            DOCKERFILE="${entry#*:}"
            IMAGE="${ECR_REGISTRY}/sanji/${SERVICE}"
            echo "::group::build ${SERVICE}"
            docker build -f "${DOCKERFILE}" -t "${IMAGE}:latest" .
            docker push "${IMAGE}:latest"
            echo "::endgroup::"
          done

  # [wave 배포 이유]
  # 계정 Fargate On-Demand vCPU 한도가 30이고, 정상 운영 시 19.5 vCPU를 씁니다.
  # 10개 서비스를 동시에 롤링하면 old + new 태스크가 겹쳐 ~39 vCPU가 필요해 한도 초과됩니다.
  # wave로 나눠 배포하면 한 wave 안에서만 겹치므로 최대 27.5 vCPU로 유지됩니다.

  # -------------------------------------------------------------------------
  # 2) Wave 1: 인프라 서비스
  # -------------------------------------------------------------------------
  wave-1:
    name: "Wave 1: config / discovery / gateway"
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        run: |
          set -euo pipefail
          export AWS_MAX_ATTEMPTS=80

          # 각 서비스의 update-service + wait를 백그라운드로 동시에 실행합니다.
          deploy_parallel() {
            local pids=()
            for SERVICE in "$@"; do
              (
                aws ecs update-service \
                  --cluster "${ECS_CLUSTER}" \
                  --service "${SERVICE}" \
                  --force-new-deployment \
                  --region "${AWS_REGION}" \
                  --no-cli-pager > /dev/null
                echo "배포 시작: ${SERVICE}"
                aws ecs wait services-stable \
                  --cluster "${ECS_CLUSTER}" \
                  --region "${AWS_REGION}" \
                  --services "${SERVICE}"
                echo "배포 완료: ${SERVICE}"
              ) &
              pids+=($!)
            done
            for pid in "${pids[@]}"; do wait "$pid" || exit 1; done
          }

          deploy_parallel config-server discovery-server gateway-server

  # -------------------------------------------------------------------------
  # 3) Wave 2: 앱 서비스 (1)
  #    user(2) + auction(2) + order(2) + payment(2)
  #    배포 중 최대 vCPU: 19.5(운영) + 8(신규) = 27.5
  # -------------------------------------------------------------------------
  wave-2:
    name: "Wave 2: user / auction / order / payment"
    needs: wave-1
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        run: |
          set -euo pipefail
          export AWS_MAX_ATTEMPTS=80

          deploy_parallel() {
            local pids=()
            for SERVICE in "$@"; do
              (
                aws ecs update-service \
                  --cluster "${ECS_CLUSTER}" \
                  --service "${SERVICE}" \
                  --force-new-deployment \
                  --region "${AWS_REGION}" \
                  --no-cli-pager > /dev/null
                echo "배포 시작: ${SERVICE}"
                aws ecs wait services-stable \
                  --cluster "${ECS_CLUSTER}" \
                  --region "${AWS_REGION}" \
                  --services "${SERVICE}"
                echo "배포 완료: ${SERVICE}"
              ) &
              pids+=($!)
            done
            for pid in "${pids[@]}"; do wait "$pid" || exit 1; done
          }

          deploy_parallel user-service auction-service order-service payment-service

  # -------------------------------------------------------------------------
  # 4) Wave 3: 앱 서비스 (2)
  #    bid(4, 2태스크) + notification(2) + ai(2)
  #    배포 중 최대 vCPU: 19.5(운영) + 8(신규) = 27.5
  # -------------------------------------------------------------------------
  wave-3:
    name: "Wave 3: bid / notification / ai"
    needs: wave-2
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        run: |
          set -euo pipefail
          export AWS_MAX_ATTEMPTS=80

          deploy_parallel() {
            local pids=()
            for SERVICE in "$@"; do
              (
                aws ecs update-service \
                  --cluster "${ECS_CLUSTER}" \
                  --service "${SERVICE}" \
                  --force-new-deployment \
                  --region "${AWS_REGION}" \
                  --no-cli-pager > /dev/null
                echo "배포 시작: ${SERVICE}"
                aws ecs wait services-stable \
                  --cluster "${ECS_CLUSTER}" \
                  --region "${AWS_REGION}" \
                  --services "${SERVICE}"
                echo "배포 완료: ${SERVICE}"
              ) &
              pids+=($!)
            done
            for pid in "${pids[@]}"; do wait "$pid" || exit 1; done
          }

          deploy_parallel bid-service notification-service ai-service
